        %{entry_name} — Transaction name
        %{date} — Entry date (long format)
        %{account_name} — Account name
        %{category_name} — Category, or a localized “needs categorization” label when none / uncategorized
        %{merchant_name} — Merchant (may be empty)
        %{quick_categorize_url} — Link to quick-categorize this transaction (must be logged in)
      template_transaction_title_label: Title template
      template_transaction_body_label: Body template
      template_balance_heading: Balance notifications (after sync / scheduled)
      ntfy_balance_prior_days_label: Compare to balance how many days ago?
      ntfy_balance_prior_days_hint: "Used for balance change and prior-balance template variables. Set to 0 to hide comparison. Range: 0–365."
      template_variables_balance: |
        Available variables:
        %{rule_name} — Notification rule name (or “Untitled rule” if blank)
        %{account_name} — Account name
        %{account_url} — Absolute URL to this account (for custom tap links)
        %{balance} — Formatted current balance
        %{currency} — Currency code
        %{balance_change} — Formatted difference (current − balance on or before that day)
        %{balance_change_abs} — Absolute change, formatted
        %{prior_balance} — Formatted balance on or before the comparison date
        %{prior_days} — Comparison window in days (same as the setting above)
        %{prior_date} — Calendar date used as the comparison anchor (long format)
        %{prior_balance_date} — Date of the ledger row used for the prior balance (long format)
        %{balance_change_line} — Localized one-line summary (leading newline when present; empty if no data)
      template_balance_title_label: Title template
      template_balance_body_label: Body template
      template_summary_heading: Summary notifications (scheduled)
      template_variables_summary: |
        Available variables:
        %{rule_name} — Notification rule name (or “Untitled rule” if blank)
        %{family_name} — Family name
        %{family_currency} — Family currency code
        %{generated_at} — Summary generation date/time (family timezone, long format)
        %{accounts_count} — Number of accounts included in summary
        %{asset_accounts_count} — Number of asset accounts included
        %{liability_accounts_count} — Number of liability accounts included
        %{total_assets} — Total assets in family currency
        %{total_liabilities} — Total liabilities in family currency
        %{net_worth} — Net worth (= assets − liabilities) in family currency
        %{accounts_breakdown} — One line per account with converted total
        %{asset_accounts_breakdown} — One line per asset account
        %{liability_accounts_breakdown} — One line per liability account
        %{dashboard_url} — Absolute URL to the app home (same as root)
        %{root_url} — Same as dashboard_url
      template_summary_title_label: Summary title template
      template_summary_body_label: Summary body template
      template_leave_blank_hint: Leave empty to use the default template.
