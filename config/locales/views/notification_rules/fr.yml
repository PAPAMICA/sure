      template_transaction_heading: Notifications de transaction
      template_variables_transaction: |
        Variables disponibles :
        %{rule_name} — Nom de la règle (ou libellé « Règle sans titre » si le nom est vide)
        %{sign_label} — Libellé revenu / dépense
        %{amount} — Montant formaté (valeur absolue)
        %{entry_name} — Libellé de la transaction
        %{date} — Date de l’écriture (format long)
        %{account_name} — Nom du compte
        %{category_name} — Catégorie, ou libellé « à catégoriser » si aucune / non classée
        %{merchant_name} — Commerçant (peut être vide)
        %{quick_categorize_url} — Lien vers la catégorisation rapide pour cette transaction (connexion requise)
      template_transaction_title_label: Modèle du titre
      template_transaction_body_label: Modèle du corps
      template_balance_heading: Notifications de solde (après sync / planifié)
      ntfy_balance_prior_days_label: Comparer au solde d’il y a combien de jours ?
      ntfy_balance_prior_days_hint: "Sert pour les variables d’écart et de solde antérieur dans les modèles. Mettez 0 pour masquer la comparaison. Plage : 0–365."
      template_variables_balance: |
        Variables disponibles :
        %{rule_name} — Nom de la règle (ou libellé « Règle sans titre » si le nom est vide)
        %{account_name} — Nom du compte
        %{account_url} — URL absolue vers ce compte (liens personnalisés)
        %{balance} — Solde actuel formaté
        %{currency} — Code devise
        %{balance_change} — Écart formaté (solde actuel − solde au plus tard à cette date)
        %{balance_change_abs} — Écart en valeur absolue, formaté
        %{prior_balance} — Solde formaté au plus tard à la date de référence
        %{prior_days} — Nombre de jours de comparaison (comme le réglage ci-dessus)
        %{prior_date} — Date calendaire servant d’ancre de comparaison (format long)
        %{prior_balance_date} — Date de la ligne de grand livre utilisée pour le solde antérieur (format long)
        %{balance_change_line} — Résumé sur une ligne, localisé (saut de ligne en tête si présent ; vide si pas de données)
      template_balance_title_label: Modèle du titre
      template_balance_body_label: Modèle du corps
      template_summary_heading: Notifications de résumé (planifié)
      template_variables_summary: |
        Variables disponibles :
        %{rule_name} — Nom de la règle (ou libellé « Règle sans titre » si le nom est vide)
        %{family_name} — Nom de la famille
        %{family_currency} — Code devise de la famille
        %{generated_at} — Date/heure de génération du résumé (fuseau famille, format long)
        %{accounts_count} — Nombre de comptes inclus dans le résumé
        %{asset_accounts_count} — Nombre de comptes d’actif inclus
        %{liability_accounts_count} — Nombre de comptes de passif inclus
        %{total_assets} — Total des actifs dans la devise de la famille
        %{total_liabilities} — Total des passifs dans la devise de la famille
        %{net_worth} — Patrimoine net (= actifs − passifs) dans la devise de la famille
        %{accounts_breakdown} — Une ligne par compte avec le total converti
        %{asset_accounts_breakdown} — Une ligne par compte d’actif
        %{liability_accounts_breakdown} — Une ligne par compte de passif
        %{dashboard_url} — URL absolue vers l’accueil de l’app (identique à root)
        %{root_url} — Identique à dashboard_url
      template_summary_title_label: Modèle du titre du résumé
      template_summary_body_label: Modèle du corps du résumé
      template_leave_blank_hint: Laisser vide pour utiliser le modèle par défaut.
      save_ntfy_settings: Enregistrer les paramètres
