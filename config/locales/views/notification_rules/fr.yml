        Variables disponibles :
        %{rule_name} — Nom de la règle (ou libellé « Règle sans titre » si le nom est vide)
        %{account_name} — Nom du compte
        %{balance} — Solde actuel formaté
        %{currency} — Code devise
        %{balance_change} — Écart formaté (solde actuel − solde au plus tard à cette date)
